name: Backend Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JS syntax check
        run: node --check iris-plus.js

      - name: Bash script syntax
        run: bash -n scripts/backend-go-live.sh scripts/supabase-set-secrets.sh scripts/supabase-deploy-functions.sh scripts/setup-stripe-webhook.sh scripts/trigger-maintenance.sh
