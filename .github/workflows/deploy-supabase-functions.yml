name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - 'scripts/supabase-deploy-functions.sh'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: xzhgyamzfthqrcaljdqv
    steps:
      - name: Check deploy secrets
        id: deploy_secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Supabase function deploy: SUPABASE_ACCESS_TOKEN is not configured."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.deploy_secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.deploy_secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase CLI
        if: steps.deploy_secrets.outputs.ready == 'true'
        run: npm install -g supabase

      - name: Deploy functions
        if: steps.deploy_secrets.outputs.ready == 'true'
        run: |
          bash ./scripts/supabase-deploy-functions.sh
