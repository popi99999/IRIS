name: Run Marketplace Maintenance

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Check maintenance secrets
        id: maintenance_secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$CRON_SECRET" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping marketplace maintenance: SUPABASE_URL, SUPABASE_ANON_KEY, or CRON_SECRET is not configured."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.maintenance_secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Write env file
        if: steps.maintenance_secrets.outputs.ready == 'true'
        run: |
          cat > .env.local <<EOF
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          CRON_SECRET=${CRON_SECRET}
          EOF

      - name: Trigger maintenance
        if: steps.maintenance_secrets.outputs.ready == 'true'
        run: bash ./scripts/trigger-maintenance.sh .env.local
