name: IrisApp
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: IrisApp
    PRODUCT_BUNDLE_IDENTIFIER: it.iris.app
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: IRIS
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
targets:
  IrisApp:
    type: application
    platform: iOS
    supportedDestinations:
      - iOS
    deploymentTarget: "17.0"
    sources:
      - path: IrisApp
        excludes:
          - Assets.xcassets
      - path: IrisApp/Assets.xcassets
        buildPhase: resources
    postBuildScripts:
      - name: Sync Marketplace Bundle
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Web"
          mkdir -p "$DEST"
          cp "$SRCROOT/index.html" "$DEST/"
          cp "$SRCROOT/iris-plus.css" "$DEST/"
          cp "$SRCROOT/iris-plus.js" "$DEST/"
          cp "$SRCROOT/iris-i18n-config.js" "$DEST/"
          cp "$SRCROOT/manifest.json" "$DEST/"
          cp "$SRCROOT/sw.js" "$DEST/"
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
